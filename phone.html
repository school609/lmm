<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机桌面</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:10px;
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
  }
  
  .phone-body{
    width:100%;
    max-width:380px;
    height:90vh;
    max-height:750px;
    background:#0a0a0a;
    border-radius:30px;
    padding:12px;
    box-shadow:0 0 30px rgba(0,0,0,0.5), inset 0 0 2px #333;
  }
  
  .screen{
    width:100%;
    height:100%;
    background:#1c1c1e;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  
  .page{display:none;flex-direction:column;height:100%;width:100%}
  .page.active{display:flex}

  .status-bar{
    padding:12px 20px 6px;
    display:flex;
    justify-content:space-between;
    color:#fff;
    font-size:12px;
    font-weight:bold;
  }
  .status-bar .time{flex:1}
  .status-bar .icons{display:flex;gap:6px;font-size:11px}
  
  .desktop{
    flex:1;
    padding:20px 15px;
    display:flex;
    flex-wrap:wrap;
    gap:20px 12px;
    align-content:flex-start;
  }
  
  .app-icon{
    width:65px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    cursor:pointer;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .app-icon:active{opacity:0.6}
  .app-icon .icon-img{
    width:55px;
    height:55px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:#fff;
  }
  .app-icon .icon-label{
    font-size:11px;
    color:#ccc;
    text-align:center;
    line-height:1.3;
  }
  
  .icon-wechat{background:#07c160}
  .icon-weibo{background:#eb7340}
  .icon-lock{background:#2c3e2d}
  .icon-photo{background:#555}
  .icon-browser{background:#4285f4}
  .icon-phone{background:#34c759}
  .icon-message{background:#007aff}
  .icon-music{background:#fc3c44}
  .icon-settings{background:#8e8e93}
  .icon-qq{background:#12b7f5}
  
  .dock{
    background:rgba(255,255,255,0.05);
    padding:10px 25px 20px;
    display:flex;
    justify-content:space-around;
    border-radius:0 0 22px 22px;
  }
  .dock .app-icon .icon-img{
    width:45px;
    height:45px;
    border-radius:12px;
    font-size:22px;
  }

  .browser-top{
    background:#2a2a2e;
    padding:8px 12px;
  }
  .browser-address{
    background:#3a3a3e;
    border-radius:8px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .browser-address input{
    flex:1;
    background:transparent;
    border:none;
    color:#fff;
    font-size:14px;
    outline:none;
  }
  .browser-address input::placeholder{color:#888}
  
  .search-home{
    flex:1;
    background:#1c1c1e;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:60px;
  }
  .search-home .search-logo{
    font-size:36px;
    color:#fff;
    margin-bottom:30px;
    letter-spacing:2px;
    font-weight:bold;
  }
  .search-home .search-box2{
    width:85%;
    display:flex;
    gap:8px;
    background:#2a2a2e;
    border-radius:20px;
    padding:12px 18px;
    align-items:center;
  }
  .search-home .search-box2 input{
    flex:1;
    background:transparent;
    border:none;
    color:#fff;
    font-size:15px;
    outline:none;
  }
  .search-home .search-box2 input::placeholder{color:#888}
  .search-home .search-box2 .search-btn{
    color:#4285f4;
    font-size:18px;
    cursor:pointer;
    background:none;
    border:none;
  }
  .search-hint{
    color:#999;
    font-size:12px;
    margin-top:15px;
    text-align:center;
    min-height:18px;
  }
  
  .back-arrow{
    position:absolute;
    top:12px;
    left:12px;
    z-index:20;
    color:#fff;
    font-size:20px;
    cursor:pointer;
    background:none;
    border:none;
  }

  /* ========== 微信样式 ========== */
  .wechat-page{
    background:#ededed;
    flex:1;
    display:flex;
    flex-direction:column;
  }
  .wechat-top{
    background:#1a1a1a;
    color:#fff;
    padding:10px 15px;
    font-size:16px;
    font-weight:bold;
    text-align:center;
    letter-spacing:1px;
  }
  .wechat-tabs{
    display:flex;
    background:#1a1a1a;
    color:#999;
    font-size:13px;
    padding:0 10px 8px;
    justify-content:space-around;
  }
  .wechat-tabs span{
    padding:4px 0;
    cursor:default;
  }
  .wechat-tabs span.active-tab{
    color:#07c160;
    border-bottom:2px solid #07c160;
  }
  .wechat-chat-list{
    flex:1;
    background:#fff;
    overflow-y:auto;
  }
  .chat-item{
    display:flex;
    align-items:center;
    padding:14px 15px;
    border-bottom:1px solid #f0f0f0;
    cursor:pointer;
    gap:12px;
  }
  .chat-item:active{background:#f5f5f5}
  .chat-item .avatar{
    width:48px;
    height:48px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    color:#fff;
    flex-shrink:0;
  }
  .chat-item .chat-info{flex:1;min-width:0}
  .chat-item .chat-name{font-size:15px;color:#333;margin-bottom:3px}
  .chat-item .chat-preview{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-item .chat-right{text-align:right;flex-shrink:0}
  .chat-item .chat-time{font-size:11px;color:#ccc;margin-bottom:3px}
  .chat-item .badge{
    display:inline-block;
    width:18px;height:18px;
    background:#ff3b30;
    color:#fff;
    border-radius:50%;
    font-size:11px;
    text-align:center;
    line-height:18px;
  }

  /* ========== 聊天详情 ========== */
  .chat-detail{
    flex:1;
    background:#ededed;
    display:flex;
    flex-direction:column;
  }
  .chat-detail-top{
    background:#1a1a1a;
    color:#fff;
    padding:10px 15px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .chat-detail-top .back-btn{font-size:18px;cursor:pointer;color:#fff}
  .chat-detail-top .name{flex:1;text-align:center;font-weight:bold;font-size:15px}
  .chat-bubbles{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .bubble{
    max-width:75%;
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;
    line-height:1.6;
    word-break:break-word;
  }
  .bubble.left{
    background:#fff;
    align-self:flex-start;
    border-radius:8px 8px 8px 2px;
    color:#333;
  }
  .bubble.right{
    background:#95ec69;
    align-self:flex-end;
    border-radius:8px 8px 2px 8px;
    color:#000;
  }
  .chat-input-bar{
    background:#f5f5f5;
    padding:10px 12px;
    display:flex;
    gap:8px;
    align-items:center;
    border-top:1px solid #ddd;
  }
  .chat-input-bar input{
    flex:1;
    padding:8px 12px;
    border:1px solid #ddd;
    border-radius:20px;
    font-size:14px;
    background:#fff;
    outline:none;
  }
  .chat-input-bar button{
    width:36px;height:36px;
    border-radius:50%;
    background:#07c160;
    border:none;
    font-size:16px;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .avatar-green{background:#07c160}
  .avatar-blue{background:#5b9bd5}
  .avatar-orange{background:#f4a460}
  .avatar-purple{background:#9b59b6}
  .avatar-teal{background:#1abc9c}
  .avatar-pink{background:#e91e63}
  .avatar-indigo{background:#3f51b5}
  .avatar-brown{background:#795548}
  .avatar-cyan{background:#00bcd4}
  .avatar-lime{background:#cddc39}
</style>
</head>
<body>
<div class="phone-body">
  <div class="screen">
    
    <!-- ========== 桌面页 ========== -->
    <div class="page active" id="page-desktop">
      <div class="status-bar">
        <span class="time">14:32</span>
        <span class="icons">📶 🔋</span>
      </div>
      
      <div class="desktop">
        <div class="app-icon" onclick="goTo('page-browser')">
          <div class="icon-img icon-browser">🌐</div>
          <span class="icon-label">浏览器</span>
        </div>
        
        <div class="app-icon" onclick="goTo('page-wechat')">
          <div class="icon-img icon-wechat">💬</div>
          <span class="icon-label">微信</span>
        </div>
        
        <a class="app-icon" href="weibo.html" target="_blank">
          <div class="icon-img icon-weibo">📷</div>
          <span class="icon-label">微博</span>
        </a>
        
        <a class="app-icon" href="lock.html" target="_blank">
          <div class="icon-img icon-lock">🔐</div>
          <span class="icon-label">乐家和</span>
        </a>
        
        <div class="app-icon" onclick="alert('相册为空。')">
          <div class="icon-img icon-photo">📸</div>
          <span class="icon-label">相册</span>
        </div>

        <div class="app-icon" onclick="void(0)">
          <div class="icon-img icon-phone">📞</div>
          <span class="icon-label">电话</span>
        </div>

        <div class="app-icon" onclick="void(0)">
          <div class="icon-img icon-message">✉️</div>
          <span class="icon-label">信息</span>
        </div>

        <div class="app-icon" onclick="void(0)">
          <div class="icon-img icon-music">🎵</div>
          <span class="icon-label">音乐</span>
        </div>

        <div class="app-icon" onclick="void(0)">
          <div class="icon-img icon-settings">⚙️</div>
          <span class="icon-label">设置</span>
        </div>

        <div class="app-icon" onclick="void(0)">
          <div class="icon-img icon-qq">🐧</div>
          <span class="icon-label">QQ</span>
        </div>
      </div>
      
      <div class="dock">
        <div class="app-icon" onclick="goTo('page-wechat')">
          <div class="icon-img icon-wechat">💬</div>
          <span class="icon-label">微信</span>
        </div>
        
        <div class="app-icon" onclick="goTo('page-browser')">
          <div class="icon-img icon-browser">🌐</div>
          <span class="icon-label">浏览器</span>
        </div>
      </div>
    </div>

    <!-- ========== 微信页 ========== -->
    <div class="page" id="page-wechat" style="background:#ededed">
      <div class="status-bar">
        <span class="time">14:32</span>
        <span class="icons">📶 🔋</span>
      </div>
      <div class="wechat-top">微信</div>
      <div class="wechat-tabs">
        <span class="active-tab">消息</span>
        <span>通讯录</span>
        <span>发现</span>
        <span>我</span>
      </div>
      <div class="wechat-chat-list" id="chatList">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- ========== 聊天详情页 ========== -->
    <div class="page" id="page-chat-detail" style="background:#ededed">
      <div class="status-bar">
        <span class="time">14:32</span>
        <span class="icons">📶 🔋</span>
      </div>
      <div class="chat-detail-top">
        <span class="back-btn" onclick="goTo('page-wechat')">‹</span>
        <span class="name" id="chatDetailName"></span>
        <span style="width:30px"></span>
      </div>
      <div class="chat-bubbles" id="chatBubbles"></div>
      <div class="chat-input-bar">
        <input type="text" placeholder="" disabled>
        <button>↑</button>
      </div>
    </div>

    <!-- ========== 浏览器页 ========== -->
    <div class="page" id="page-browser">
      <div class="status-bar">
        <span class="time">14:33</span>
        <span class="icons">📶 🔋</span>
      </div>
      <button class="back-arrow" onclick="goTo('page-desktop')">‹</button>
      
      <div class="browser-top">
        <div class="browser-address">
          <span style="color:#888">🔍</span>
          <input type="text" id="browserInput" placeholder="搜索或输入网址" onkeydown="if(event.key==='Enter')browserSearch()">
          <span style="color:#4285f4;cursor:pointer;font-size:14px" onclick="browserSearch()">→</span>
        </div>
      </div>
      
      <div style="flex:1;background:#1c1c1e;overflow-y:auto;padding:15px;display:none" id="searchResults">
        <p style="color:#999;font-size:12px;margin-bottom:10px" id="searchCount"></p>
        <div id="resultList"></div>
      </div>
      
      <div class="search-home" id="browserHome">
        <div class="search-logo">🔍 搜索</div>
        <div class="search-box2">
          <input type="text" id="browserInput2" placeholder="搜索你想了解的内容..." onkeydown="if(event.key==='Enter')browserSearch()">
          <button class="search-btn" onclick="browserSearch()">🔍</button>
        </div>
        <p class="search-hint" id="browserHint"></p>
      </div>
    </div>

  </div>
</div>

<script>
// ========== 页面切换 ==========
function goTo(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  window.scrollTo(0,0);
  
  if(pageId === 'page-wechat'){
    buildChatList();
  }
}

// ========== 浏览器搜索 ==========
function browserSearch(){
  var val = (document.getElementById('browserInput').value || document.getElementById('browserInput2').value).trim();
  if(!val){
    document.getElementById('browserHint').innerText = '';
    return;
  }
  
  document.getElementById('browserHome').style.display = 'none';
  document.getElementById('searchResults').style.display = 'block';
  
  if(val === '明川实验中学'){
    document.getElementById('searchCount').innerText = '找到约 1 条结果';
    document.getElementById('resultList').innerHTML = '<div style="padding:15px;margin:8px 0;border-radius:6px;cursor:pointer;background:#2a2a2e" onclick="window.open(\'index.html\',\'_blank\')"><p style="color:#4285f4;font-size:15px;font-weight:bold;margin-bottom:4px">明川实验中学官网</p><p style="color:#4caf50;font-size:11px;margin-bottom:4px">https://school609.github.io/lmm/</p><p style="color:#aaa;font-size:12px">明川实验中学官方校友档案查询系统。</p></div>';
  } else if(val === '乐家阖'){
    document.getElementById('searchCount').innerText = '找到约 1 条结果';
    document.getElementById('resultList').innerHTML = '<div style="padding:15px;margin:8px 0;border-radius:6px;cursor:pointer;background:#2a2a2e" onclick="window.open(\'lejiahe.html\',\'_blank\')"><p style="color:#4285f4;font-size:15px;font-weight:bold;margin-bottom:4px">乐家和官网 · 欢迎来到乐家和</p><p style="color:#4caf50;font-size:11px;margin-bottom:4px">https://school609.github.io/lmm/lejiahe.html</p><p style="color:#aaa;font-size:12px">我们竭力为您和您的家庭服务。阖家欢乐，乐家和。</p></div>';
  } else {
    document.getElementById('searchCount').innerText = '未找到相关结果';
    document.getElementById('resultList').innerHTML = '<p style="color:#888;text-align:center;padding:30px">没有找到与 "' + val + '" 相关的结果。</p>';
  }
}

// ========== 微信 ==========
var chatData = [
  {name:'妈妈', avatarClass:'avatar-orange', avatarEmoji:'👩', canOpen:true, messages:[
    {type:'left', text:'这周末回家吗？'},
    {type:'right', text:'看情况吧，最近有点忙。'},
    {type:'left', text:'注意身体。'},
  ]},
  {name:'爸爸', avatarClass:'avatar-blue', avatarEmoji:'👨', canOpen:true, messages:[
    {type:'left', text:'钱够用吗？'},
    {type:'right', text:'够的，放心吧。'},
    {type:'left', text:'不够就说。'},
  ]},
  {name:'张经理', avatarClass:'avatar-teal', avatarEmoji:'👔', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'赵老师', avatarClass:'avatar-purple', avatarEmoji:'👩‍🏫', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'小沈', avatarClass:'avatar-pink', avatarEmoji:'🙋', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'刘阿姨', avatarClass:'avatar-brown', avatarEmoji:'👵', canOpen:false, preview:'欢迎回家', badge:true},
  // 随机生成5个
  {name:'周叔叔', avatarClass:'avatar-indigo', avatarEmoji:'🧔', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'陈姐', avatarClass:'avatar-cyan', avatarEmoji:'👩‍💼', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'黄师傅', avatarClass:'avatar-lime', avatarEmoji:'👨‍🔧', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'林老师', avatarClass:'avatar-green', avatarEmoji:'👨‍🏫', canOpen:false, preview:'欢迎回家', badge:true},
  {name:'孙阿姨', avatarClass:'avatar-orange', avatarEmoji:'👩‍🍳', canOpen:false, preview:'欢迎回家', badge:true},
];

function buildChatList(){
  var container = document.getElementById('chatList');
  if(!container) return;
  var html = '';
  chatData.forEach(function(chat, index){
    html += '<div class="chat-item" onclick="openChat('+index+')">';
    html += '<div class="avatar '+chat.avatarClass+'">'+chat.avatarEmoji+'</div>';
    html += '<div class="chat-info">';
    html += '<div class="chat-name">'+chat.name+'</div>';
    html += '<div class="chat-preview">'+(chat.preview || (chat.messages && chat.messages.length>0 ? chat.messages[chat.messages.length-1].text : ''))+'</div>';
    html += '</div>';
    html += '<div class="chat-right">';
    html += '<div class="chat-time">14:32</div>';
    if(chat.badge){
      html += '<div class="badge">1</div>';
    }
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function openChat(index){
  var chat = chatData[index];
  if(!chat.canOpen){
    // 不可点击，什么都不做
    return;
  }
  document.getElementById('chatDetailName').innerText = chat.name;
  var bubbles = document.getElementById('chatBubbles');
  var html = '';
  chat.messages.forEach(function(msg){
    html += '<div class="bubble '+msg.type+'">'+msg.text+'</div>';
  });
  bubbles.innerHTML = html;
  goTo('page-chat-detail');
}
</script>
</body>
</html>
