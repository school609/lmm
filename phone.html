<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机桌面</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:10px;
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
  }
  
  .phone-body{
    width:100%;
    max-width:380px;
    height:90vh;
    max-height:750px;
    background:#0a0a0a;
    border-radius:30px;
    padding:12px;
    box-shadow:0 0 30px rgba(0,0,0,0.5), inset 0 0 2px #333;
  }
  
  .screen{
    width:100%;
    height:100%;
    background:#1c1c1e;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  
  .page{display:none;flex-direction:column;height:100%;width:100%}
  .page.active{display:flex}

  .status-bar{
    padding:12px 20px 6px;
    display:flex;
    justify-content:space-between;
    color:#fff;
    font-size:12px;
    font-weight:bold;
  }
  .status-bar .time{flex:1}
  .status-bar .icons{display:flex;gap:6px;font-size:11px}
  
  .desktop{
    flex:1;
    padding:20px 15px;
    display:flex;
    flex-wrap:wrap;
    gap:20px 12px;
    align-content:flex-start;
  }
  
  .app-icon{
    width:65px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    cursor:pointer;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .app-icon:active{opacity:0.6}
  .app-icon .icon-img{
    width:55px;
    height:55px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:#fff;
  }
  .app-icon .icon-label{
    font-size:11px;
    color:#ccc;
    text-align:center;
    line-height:1.3;
  }
  
  .icon-wechat{background:#07c160}
  .icon-weibo{background:#eb7340}
  .icon-lock{background:#2c3e2d}
  .icon-photo{background:#555}
  .icon-browser{background:#4285f4}
  
  .dock{
    background:rgba(255,255,255,0.05);
    padding:10px 25px 20px;
    display:flex;
    justify-content:space-around;
    border-radius:0 0 22px 22px;
  }
  .dock .app-icon .icon-img{
    width:45px;
    height:45px;
    border-radius:12px;
    font-size:22px;
  }

  .browser-top{
    background:#2a2a2e;
    padding:8px 12px;
  }
  .browser-address{
    background:#3a3a3e;
    border-radius:8px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .browser-address input{
    flex:1;
    background:transparent;
    border:none;
    color:#fff;
    font-size:14px;
    outline:none;
  }
  .browser-address input::placeholder{color:#888}
  
  .search-home{
    flex:1;
    background:#1c1c1e;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:60px;
  }
  .search-home .search-logo{
    font-size:36px;
    color:#fff;
    margin-bottom:30px;
    letter-spacing:2px;
    font-weight:bold;
  }
  .search-home .search-box2{
    width:85%;
    display:flex;
    gap:8px;
    background:#2a2a2e;
    border-radius:20px;
    padding:12px 18px;
    align-items:center;
  }
  .search-home .search-box2 input{
    flex:1;
    background:transparent;
    border:none;
    color:#fff;
    font-size:15px;
    outline:none;
  }
  .search-home .search-box2 input::placeholder{color:#888}
  .search-home .search-box2 .search-btn{
    color:#4285f4;
    font-size:18px;
    cursor:pointer;
    background:none;
    border:none;
  }
  .search-hint{
    color:#999;
    font-size:12px;
    margin-top:15px;
    text-align:center;
    min-height:18px;
  }
  
  .back-arrow{
    position:absolute;
    top:12px;
    left:12px;
    z-index:20;
    color:#fff;
    font-size:20px;
    cursor:pointer;
    background:none;
    border:none;
  }
</style>
</head>
<body>
<div class="phone-body">
  <div class="screen">
    
    <!-- ========== 桌面页 ========== -->
    <div class="page active" id="page-desktop">
      <div class="status-bar">
        <span class="time">14:32</span>
        <span class="icons">📶 🔋</span>
      </div>
      
      <div class="desktop">
        <div class="app-icon" onclick="goTo('page-browser')">
          <div class="icon-img icon-browser">🌐</div>
          <span class="icon-label">浏览器</span>
        </div>
        
        <a class="app-icon" href="weibo.html" target="_blank">
          <div class="icon-img icon-weibo">📷</div>
          <span class="icon-label">微博</span>
        </a>
        
        <a class="app-icon" href="lock.html" target="_blank">
          <div class="icon-img icon-lock">🔐</div>
          <span class="icon-label">乐家和</span>
        </a>
        
        <div class="app-icon" onclick="alert('相册为空。')">
          <div class="icon-img icon-photo">📸</div>
          <span class="icon-label">相册</span>
        </div>
      </div>
      
      <div class="dock">
        <a class="app-icon" href="chat.html" target="_blank">
          <div class="icon-img icon-wechat">💬</div>
          <span class="icon-label">微信</span>
        </a>
        
        <div class="app-icon" onclick="goTo('page-browser')">
          <div class="icon-img icon-browser">🌐</div>
          <span class="icon-label">浏览器</span>
        </div>
      </div>
    </div>

    <!-- ========== 浏览器页 ========== -->
    <div class="page" id="page-browser">
      <div class="status-bar">
        <span class="time">14:33</span>
        <span class="icons">📶 🔋</span>
      </div>
      <button class="back-arrow" onclick="goTo('page-desktop')">‹</button>
      
      <div class="browser-top">
        <div class="browser-address">
          <span style="color:#888">🔍</span>
          <input type="text" id="browserInput" placeholder="搜索或输入网址" onkeydown="if(event.key==='Enter')browserSearch()">
          <span style="color:#4285f4;cursor:pointer;font-size:14px" onclick="browserSearch()">→</span>
        </div>
      </div>
      
      <div style="flex:1;background:#1c1c1e;overflow-y:auto;padding:15px;display:none" id="searchResults">
        <p style="color:#999;font-size:12px;margin-bottom:10px" id="searchCount"></p>
        <div id="resultList"></div>
      </div>
      
      <div class="search-home" id="browserHome">
        <div class="search-logo">🔍 搜索</div>
        <div class="search-box2">
          <input type="text" id="browserInput2" placeholder="搜索你想了解的内容..." onkeydown="if(event.key==='Enter')browserSearch()">
          <button class="search-btn" onclick="browserSearch()">🔍</button>
        </div>
        <p class="search-hint" id="browserHint"></p>
      </div>
    </div>

  </div>
</div>

<script>
function goTo(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function browserSearch(){
  var val = (document.getElementById('browserInput').value || document.getElementById('browserInput2').value).trim();
  if(!val){
    document.getElementById('browserHint').innerText = '';
    return;
  }
  
  document.getElementById('browserHome').style.display = 'none';
  document.getElementById('searchResults').style.display = 'block';
  
  if(val === '明川实验中学'){
    document.getElementById('searchCount').innerText = '找到约 1 条结果';
    document.getElementById('resultList').innerHTML = '<div style="padding:15px;margin:8px 0;border-radius:6px;cursor:pointer;background:#2a2a2e" onclick="window.open(\'index.html\',\'_blank\')"><p style="color:#4285f4;font-size:15px;font-weight:bold;margin-bottom:4px">明川实验中学官网</p><p style="color:#4caf50;font-size:11px;margin-bottom:4px">https://school609.github.io/lmm/</p><p style="color:#aaa;font-size:12px">明川实验中学官方校友档案查询系统。</p></div>';
  } else if(val === '乐家阖'){
    document.getElementById('searchCount').innerText = '找到约 1 条结果';
    document.getElementById('resultList').innerHTML = '<div style="padding:15px;margin:8px 0;border-radius:6px;cursor:pointer;background:#2a2a2e" onclick="window.open(\'lejiahe.html\',\'_blank\')"><p style="color:#4285f4;font-size:15px;font-weight:bold;margin-bottom:4px">乐家和官网 · 欢迎来到乐家和</p><p style="color:#4caf50;font-size:11px;margin-bottom:4px">https://school609.github.io/lmm/lejiahe.html</p><p style="color:#aaa;font-size:12px">我们竭力为您和您的家庭服务。阖家欢乐，乐家和。</p></div>';
  } else {
    document.getElementById('searchCount').innerText = '未找到相关结果';
    document.getElementById('resultList').innerHTML = '<p style="color:#888;text-align:center;padding:30px">没有找到与 "' + val + '" 相关的结果。</p>';
  }
}
</script>
</body>
</html>
